# Ahwa product catalog
# Edit this file to update titles, descriptions, prices, or images.
# Pushing changes to GitHub will auto-deploy via Netlify.
#
# Field guide
#   id           unique short ID (do not reuse)
#   cat          category — must match one of: turkish, espresso, tea
#   name         display name
#   origin       small uppercase tag shown on the card image
#   description  paragraph shown under the name
#   price        number (no currency symbol)
#   unit         right-side text after the price, e.g. "/ 200g"
#   notes        list of short tasting/flavor notes
#   image        path to the product photo, relative to /public

categories:
  - id: all
    label: All
  - id: turkish
    label: Turkish
  - id: espresso
    label: Espresso
  - id: tea
    label: Tea

products:
